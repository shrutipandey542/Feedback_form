<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f2f2f2;
            font-family: Arial, sans-serif;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        button {
            margin-top: 10px;
            padding: 8px 15px;
            cursor: pointer;
        }

        p {
            color: green;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Feedback Form</h2>

    <form method="POST">
        Name:<br>
        <input type="text" name="name" required><br><br>

        Feedback:<br>
        <textarea name="feedback" required></textarea><br><br>

        <button type="submit">Submit</button>
    </form>

    <p>{{ message }}</p>
</div>

</body>
</html>
